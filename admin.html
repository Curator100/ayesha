<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Admin – TuitionMedia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;min-height:100vh;background:#100818;color:#fff}

/* LOGIN */
#loginWrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(145deg,#18082e,#2d0a3e)}
#loginWrap h1{font-size:26px;font-weight:900;color:#ff3369;margin-bottom:4px}
#loginWrap p{font-size:13px;color:#c4005a;margin-bottom:24px}
.lcard{background:rgba(255,255,255,0.05);border:1px solid rgba(255,51,105,0.3);border-radius:20px;padding:28px 22px;width:100%;max-width:380px}
.lf{margin-bottom:15px}
.lf label{font-size:12px;font-weight:700;color:#ff99bb;display:block;margin-bottom:5px}
.lf input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,51,105,0.25);border-radius:10px;color:#fff;font-size:14px;font-family:Arial,sans-serif;outline:none}
.lf input:focus{border-color:#ff3369}
.rbtn{width:100%;padding:13px;background:linear-gradient(135deg,#e0004e,#ff3369);color:#fff;border:none;border-radius:12px;font-size:15px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;margin-top:6px}
.rbtn:disabled{opacity:.6;cursor:not-allowed}

/* DASH */
#dash{display:none;min-height:100vh}
.ah{background:linear-gradient(135deg,#1a0a2e,#2d0036);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,51,105,0.2);position:sticky;top:0;z-index:50}
.ah h1{font-size:18px;font-weight:900;color:#ff3369}
.logout{padding:7px 14px;background:rgba(255,50,50,0.12);border:1px solid rgba(255,50,50,0.3);border-radius:8px;color:#f87171;font-size:13px;font-family:Arial,sans-serif;cursor:pointer}

/* TABS */
.atabs{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;background:rgba(0,0,0,0.35);border-bottom:1px solid rgba(255,51,105,0.15);-webkit-overflow-scrolling:touch}
.atab{padding:8px 14px;border-radius:18px;border:1.5px solid rgba(255,51,105,0.3);background:rgba(255,51,105,0.06);color:#ff99bb;font-size:13px;font-family:Arial,sans-serif;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.atab.on{background:linear-gradient(135deg,#e0004e,#ff3369);color:#fff;border-color:transparent}
.tc{padding:16px;display:none}
.tc.on{display:block}

/* CARDS */
.ac{background:rgba(255,255,255,0.04);border:1px solid rgba(255,51,105,0.18);border-radius:14px;padding:15px;margin-bottom:11px}
.acn{font-size:15px;font-weight:700;color:#ff99bb}
.acm{font-size:12px;color:#9090b0;margin-top:3px;line-height:1.7}
.acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.ab{padding:6px 12px;border-radius:8px;border:1px solid;font-size:12px;font-family:Arial,sans-serif;cursor:pointer;font-weight:600}
.ab-mod{background:rgba(124,58,237,.14);border-color:rgba(124,58,237,.4);color:#a78bfa}
.ab-adm{background:rgba(224,0,78,.14);border-color:rgba(224,0,78,.4);color:#ff3369}
.ab-usr{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.2);color:#ccc}
.ab-ban{background:rgba(255,50,50,.1);border-color:rgba(255,50,50,.3);color:#f87171}
.ab-unban{background:rgba(0,200,100,.1);border-color:rgba(0,200,100,.3);color:#6ee7b7}
.ab-view{background:rgba(255,170,0,.1);border-color:rgba(255,170,0,.3);color:#fcd34d}

/* FORM */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:12px;font-weight:700;color:#ff99bb}
.ff input,.ff select,.ff textarea{padding:10px 13px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,51,105,0.2);border-radius:10px;color:#fff;font-size:13px;font-family:Arial,sans-serif;outline:none}
.ff select option{background:#1a0a2e}
.ff textarea{resize:vertical;min-height:70px}
.s2{grid-column:span 2}

/* STATUS BADGES */
.sb{display:inline-block;padding:4px 11px;border-radius:10px;font-size:11px;font-weight:700;margin-top:5px}
.sb-av{background:rgba(0,200,100,.14);color:#6ee7b7;border:1px solid rgba(0,200,100,.3)}
.sb-bk{background:rgba(255,170,0,.14);color:#fcd34d;border:1px solid rgba(255,170,0,.3)}
.sb-hd{background:rgba(100,100,100,.2);color:#9ca3af;border:1px solid rgba(100,100,100,.3)}

.tcrd{background:rgba(255,255,255,.04);border:1px solid rgba(255,51,105,.18);border-radius:14px;padding:15px;margin-bottom:11px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.ti h3{font-size:14px;font-weight:700;color:#ff99bb;margin-bottom:5px}
.ti p{font-size:12px;color:#9090b0;line-height:1.8}
.tacts{display:flex;flex-direction:column;gap:6px;min-width:120px;flex-shrink:0}

/* APPLICANT */
.arow{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:6px;flex-wrap:wrap;gap:8px}
.ainfo{font-size:13px;color:#e0e0f0;line-height:1.6}
.rbadge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;background:linear-gradient(135deg,#e0004e,#ff3369);color:#fff}

/* SEARCH */
.srow{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.sinput{flex:1;padding:10px 13px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,51,105,.2);border-radius:10px;color:#fff;font-size:13px;font-family:Arial,sans-serif;outline:none;min-width:180px}
.sbtn{padding:10px 16px;background:linear-gradient(135deg,#e0004e,#ff3369);color:#fff;border:none;border-radius:10px;font-size:13px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer}
.stitle{font-size:16px;font-weight:800;color:#ff3369;margin-bottom:13px}

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-16px);background:rgba(28,28,28,.94);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="loginWrap">
  <h1>🔐 Admin Panel</h1>
  <p>TuitionMedia Dashboard</p>
  <div class="lcard">
    <div class="lf"><label>Email</label><input type="email" id="aEmail" placeholder="admin email"/></div>
    <div class="lf"><label>Password</label><input type="password" id="aPass" placeholder="পাসওয়ার্ড"/></div>
    <button class="rbtn" id="loginBtn" onclick="doAdminLogin()">লগ ইন করুন</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="ah">
    <h1>🔴 TuitionMedia Admin</h1>
    <button class="logout" onclick="doLogout()">লগ আউট</button>
  </div>
  <div class="atabs">
    <button class="atab on" onclick="goTab('users',this)">👥 Users</button>
    <button class="atab" onclick="goTab('tuitions',this)">📋 Tuitions</button>
    <button class="atab" onclick="goTab('addtui',this)">➕ Add Tuition</button>
    <button class="atab" onclick="goTab('apps',this)">📝 Applicants</button>
    <button class="atab" onclick="goTab('sos',this)">🆘 SOS</button>
    <button class="atab" onclick="goTab('dir',this)">📁 Directory</button>
  </div>

  <!-- USERS -->
  <div class="tc on" id="tc-users">
    <div class="stitle">👥 সকল ব্যবহারকারী</div>
    <div class="srow"><input class="sinput" id="userSearch" placeholder="নাম, ইউনিভার্সিটি বা ইমেইল..." oninput="filterUsers(this.value)"/></div>
    <div id="userList"><p style="color:#888">লোড হচ্ছে...</p></div>
  </div>

  <!-- TUITIONS -->
  <div class="tc" id="tc-tuitions">
    <div class="stitle">📋 সকল টিউশন</div>
    <div id="tuiList"><p style="color:#888">লোড হচ্ছে...</p></div>
  </div>

  <!-- ADD TUITION -->
  <div class="tc" id="tc-addtui">
    <div class="stitle">➕ নতুন টিউশন যোগ করুন</div>
    <div class="fg2">
      <div class="ff"><label>টাইটেল *</label><input type="text" id="nt_title" placeholder="Class 9-10 Math টিউশন"/></div>
      <div class="ff"><label>স্যালারি (টাকা) *</label><input type="number" id="nt_salary" placeholder="5000"/></div>
      <div class="ff"><label>বিষয়</label><input type="text" id="nt_subject" placeholder="গণিত, ইংরেজি..."/></div>
      <div class="ff"><label>লোকেশন</label><input type="text" id="nt_location" placeholder="মিরপুর-১০"/></div>
      <div class="ff"><label>Zone</label>
        <select id="nt_zone">
          <option value="">বেছে নিন</option>
          <option>Zone 1</option><option>Zone 2</option><option>Zone 3</option><option>Zone 4</option><option>Zone 5</option>
          <option>Zone 6</option><option>Zone 7</option><option>Zone 8</option><option>Zone 9</option><option>Zone 10</option>
        </select>
      </div>
      <div class="ff"><label>ক্লাস</label><input type="text" id="nt_class" placeholder="Class 9-10"/></div>
      <div class="ff"><label>দিন/সপ্তাহ</label><input type="text" id="nt_days" placeholder="সপ্তাহে ৩ দিন"/></div>
      <div class="ff"><label>সময়</label><input type="text" id="nt_time" placeholder="বিকাল ৪টা"/></div>
      <div class="ff"><label>তারিখ</label><input type="date" id="nt_date"/></div>
      <div class="ff"><label>স্ট্যাটাস</label>
        <select id="nt_status">
          <option value="available">Available – Website এ দেখাবে</option>
          <option value="booked">Booked – দেখাবে না</option>
          <option value="hidden">Hidden</option>
        </select>
      </div>
      <div class="ff s2"><label>বিস্তারিত</label><textarea id="nt_desc" placeholder="টিউশনের বিস্তারিত তথ্য..."></textarea></div>
    </div>
    <button class="rbtn" style="margin-top:16px;max-width:280px" onclick="addTuition()">টিউশন যোগ করুন ✓</button>
  </div>

  <!-- APPLICANTS -->
  <div class="tc" id="tc-apps">
    <div class="stitle">📝 আবেদনকারীরা</div>
    <div id="appList"><p style="color:#888">লোড হচ্ছে...</p></div>
  </div>

  <!-- SOS -->
  <div class="tc" id="tc-sos">
    <div class="stitle">🆘 SOS অ্যালার্ট</div>
    <div id="sosList"><p style="color:#888">লোড হচ্ছে...</p></div>
  </div>

  <!-- DIRECTORY -->
  <div class="tc" id="tc-dir">
    <div class="stitle">📁 User Directory</div>
    <div class="srow">
      <input class="sinput" id="dirSearch" placeholder="বিশ্ববিদ্যালয় বা নাম দিয়ে খুঁজুন..."/>
      <button class="sbtn" onclick="filterDir(document.getElementById('dirSearch').value)">খুঁজুন</button>
    </div>
    <div id="dirList"><p style="color:#888">লোড হচ্ছে...</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://fxkmanginfisqzmjomji.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4a21hbmdpbmZpc3F6bWpvbWppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjgwNjUsImV4cCI6MjA5MjI0NDA2NX0.sCS6HrZCPyqFMPLJFSFIQO_aUzp75DWfpg1ElVi2cyc';
const sb = supabase.createClient(SB_URL, SB_KEY);

const ADMIN_EMAIL = 'rayhanchy576@gmail.com';
const TOP_UNIS = ['University of Dhaka','Bangladesh University of Engineering and Technology','Dhaka Medical College','Sir Salimullah Medical College','Shaheed Suhrawardy Medical College','Bangladesh University of Professionals'];

let allUsers = [];
let allTuitions = [];
let allDir = [];

// ── LOGIN ──────────────────────────────────────────────
async function doAdminLogin() {
  const email = document.getElementById('aEmail').value.trim();
  const pass  = document.getElementById('aPass').value;
  if (!email || !pass) { toast('Email ও পাসওয়ার্ড দিন'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'অপেক্ষা করুন...';
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password: pass});
    if (error) { toast('ভুল credentials: ' + error.message); return; }
    // Check admin/moderator role (always allow ADMIN_EMAIL)
    if (email !== ADMIN_EMAIL) {
      const {data: p} = await sb.from('profiles').select('role').eq('id', data.user.id).single();
      if (!p || !['admin','moderator'].includes(p.role)) {
        toast('আপনার Admin অ্যাক্সেস নেই');
        await sb.auth.signOut(); return;
      }
    }
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadAll();
  } catch(e) { toast('নেটওয়ার্ক সমস্যা'); }
  finally { btn.disabled = false; btn.textContent = 'লগ ইন করুন'; }
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.reload();
}

function loadAll() {
  loadUsers();
  loadTuitions();
  loadApps();
  loadSOS();
  loadDir();
}

// ── TABS ──────────────────────────────────────────────
function goTab(id, el) {
  document.querySelectorAll('.tc').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.atab').forEach(t => t.classList.remove('on'));
  document.getElementById('tc-' + id).classList.add('on');
  el.classList.add('on');
}

// ── USERS ─────────────────────────────────────────────
async function loadUsers() {
  const {data} = await sb.from('profiles').select('*').order('created_at', {ascending:false});
  allUsers = data || [];
  renderUsers(allUsers);
}
function renderUsers(list) {
  const c = document.getElementById('userList');
  if (!list.length) { c.innerHTML = '<p style="color:#888">কোনো ব্যবহারকারী নেই</p>'; return; }
  c.innerHTML = list.map(u => `
    <div class="ac">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px">
        <div>
          <div class="acn">${u.name||'—'}</div>
          <div class="acm">📧 ${u.email||'—'}<br/>📱 ${u.whatsapp||'—'}<br/>🎓 ${u.university||'—'}</div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:flex-start">
          <span style="padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;background:${u.role==='admin'?'#e0004e':u.role==='moderator'?'#7c3aed':'rgba(255,255,255,.1)'};color:#fff">${u.role||'user'}</span>
          ${u.banned?'<span style="padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;background:#333;color:#f87171">BANNED</span>':''}
        </div>
      </div>
      <div class="acts">
        <button class="ab ab-mod" onclick="setRole('${u.id}','moderator')">Moderator</button>
        <button class="ab ab-adm" onclick="setRole('${u.id}','admin')">Admin</button>
        <button class="ab ab-usr" onclick="setRole('${u.id}','user')">User</button>
        ${u.banned
          ? `<button class="ab ab-unban" onclick="setBan('${u.id}',false)">Unban</button>`
          : `<button class="ab ab-ban" onclick="setBan('${u.id}',true)">Ban</button>`}
      </div>
    </div>`).join('');
}
function filterUsers(v) {
  const f = v.toLowerCase();
  renderUsers(allUsers.filter(u => (u.name||'').toLowerCase().includes(f)||(u.university||'').toLowerCase().includes(f)||(u.email||'').toLowerCase().includes(f)));
}
async function setRole(id, role) {
  const {error} = await sb.from('profiles').update({role}).eq('id', id);
  if (error) { toast('ত্রুটি: '+error.message); return; }
  toast('Role আপডেট হয়েছে ✓');
  loadUsers();
}
async function setBan(id, banned) {
  const {error} = await sb.from('profiles').update({banned}).eq('id', id);
  if (error) { toast('ত্রুটি: '+error.message); return; }
  toast(banned ? '🚫 ব্যান করা হয়েছে' : '✅ আনব্যান হয়েছে');
  loadUsers();
}

// ── TUITIONS ──────────────────────────────────────────
async function loadTuitions() {
  const {data} = await sb.from('tuitions').select('*').order('created_at', {ascending:false});
  allTuitions = data || [];
  renderTuitions(allTuitions);
}
function renderTuitions(list) {
  const c = document.getElementById('tuiList');
  if (!list.length) { c.innerHTML = '<p style="color:#888">কোনো টিউশন নেই। Add Tuition ট্যাব থেকে যোগ করুন।</p>'; return; }
  c.innerHTML = list.map(t => `
    <div class="tcrd">
      <div class="ti" style="flex:1;min-width:200px">
        <h3>${t.title||'টিউশন'}</h3>
        <p>💰 ৳${(t.salary||0).toLocaleString()} | 📍 ${t.location||'—'} | 🗓️ ${t.zone||'—'}<br/>
        📚 ${t.subject||'—'} | 📅 ${t.days||'—'} | ⏰ ${t.time||'—'}<br/>
        🏫 Class: ${t.class||'—'} | Date: ${t.date||'—'}</p>
        <span class="sb sb-${t.status==='available'?'av':t.status==='booked'?'bk':'hd'}">${t.status==='available'?'✅ Available':t.status==='booked'?'🔒 Booked':'👁️ Hidden'}</span>
      </div>
      <div class="tacts">
        <button class="ab ab-mod" onclick="setTuiStatus('${t.id}','available')">✅ Available</button>
        <button class="ab ab-view" onclick="setTuiStatus('${t.id}','booked')">🔒 Booked</button>
        <button class="ab ab-ban" onclick="setTuiStatus('${t.id}','hidden')">🙈 Hide</button>
        <button class="ab ab-adm" onclick="showTuiApps('${t.id}','${(t.title||'টিউশন').replace(/'/g,"\\'")}')">👥 Applicants</button>
      </div>
    </div>`).join('');
}
async function setTuiStatus(id, status) {
  await sb.from('tuitions').update({status, visible: status==='available'}).eq('id', id);
  toast('স্ট্যাটাস আপডেট হয়েছে ✓');
  loadTuitions();
}

// ── ADD TUITION ───────────────────────────────────────
async function addTuition() {
  const title   = document.getElementById('nt_title').value.trim();
  const salary  = parseInt(document.getElementById('nt_salary').value)||0;
  if (!title || !salary) { toast('টাইটেল ও স্যালারি আবশ্যক'); return; }
  const obj = {
    title, salary,
    subject:  document.getElementById('nt_subject').value,
    location: document.getElementById('nt_location').value,
    zone:     document.getElementById('nt_zone').value,
    class:    document.getElementById('nt_class').value,
    days:     document.getElementById('nt_days').value,
    time:     document.getElementById('nt_time').value,
    date:     document.getElementById('nt_date').value||null,
    status:   document.getElementById('nt_status').value,
    visible:  document.getElementById('nt_status').value === 'available',
    description: document.getElementById('nt_desc').value
  };
  const {error} = await sb.from('tuitions').insert(obj);
  if (error) { toast('ত্রুটি: '+error.message); return; }
  toast('টিউশন যোগ হয়েছে ✓');
  ['nt_title','nt_salary','nt_subject','nt_location','nt_class','nt_days','nt_time','nt_date','nt_desc'].forEach(id => document.getElementById(id).value='');
  loadTuitions();
}

// ── APPLICANTS (with ranking) ─────────────────────────
async function loadApps() {
  const {data} = await sb.from('applications').select('*, profiles(name,university,whatsapp)').order('applied_at',{ascending:true});
  renderApps(data||[], 'সকল আবেদন');
}
async function showTuiApps(tuiId, tuiTitle) {
  // Switch to apps tab
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.atab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tc-apps').classList.add('on');
  document.querySelectorAll('.atab')[3].classList.add('on');

  const {data: apps} = await sb.from('applications').select('*, profiles(name,university,whatsapp)').eq('tuition_id', tuiId).order('applied_at',{ascending:true});
  const {data: surveys} = await sb.from('user_data_survey').select('*');
  const svMap = {};
  (surveys||[]).forEach(s => svMap[s.user_id] = s);

  const scored = (apps||[]).map((app, idx) => {
    let pts = 0;
    if (TOP_UNIS.includes(app.profiles?.university||'')) pts += 2;
    const sv = svMap[app.user_id];
    if (sv?.paid_media_before) pts += 1;
    if (parseInt(sv?.tuition_count||0) > 2) pts += 1;
    return {...app, score: pts, order: idx};
  });
  scored.sort((a,b) => b.score - a.score || a.order - b.order);
  renderApps(scored, `"${tuiTitle}" — আবেদনকারী (র‍্যাংক)`);
}
function renderApps(list, heading) {
  const c = document.getElementById('appList');
  if (!list.length) { c.innerHTML = `<p style="color:#888;margin-bottom:10px">${heading}</p><p style="color:#888">কোনো আবেদন নেই</p>`; return; }
  c.innerHTML = `<p style="color:#ff99bb;font-weight:700;margin-bottom:12px">${heading}</p>` +
    list.map((a,i) => `
      <div class="arow">
        <div class="ainfo">
          <strong>${a.profiles?.name||'—'}</strong><br/>
          🎓 ${a.profiles?.university||'—'}<br/>
          📱 ${a.profiles?.whatsapp||'—'}<br/>
          <span style="font-size:11px;color:#777">📋 ${a.tuition_title||'—'} | ৳${(a.salary||0).toLocaleString()}</span>
        </div>
        <span class="rbadge">#${i+1}${a.score!==undefined?' | '+a.score+' pts':''}</span>
      </div>`).join('');
}

// ── SOS ───────────────────────────────────────────────
async function loadSOS() {
  const {data} = await sb.from('sos_alerts').select('*').order('created_at',{ascending:false});
  const c = document.getElementById('sosList');
  if (!data||!data.length) { c.innerHTML='<p style="color:#888">কোনো SOS নেই</p>'; return; }
  c.innerHTML = data.map(s => `
    <div class="ac" style="border-color:rgba(255,50,50,.4)">
      <div style="color:#f87171;font-weight:700;font-size:15px">🆘 ${s.name||'—'}</div>
      <div class="acm">📱 ${s.whatsapp||'—'} | 🎓 ${s.university||'—'}<br/>⏰ ${s.created_at?new Date(s.created_at).toLocaleString('bn-BD'):'—'}</div>
    </div>`).join('');
}

// ── DIRECTORY ─────────────────────────────────────────
async function loadDir() {
  const {data} = await sb.from('profiles').select('name,whatsapp,university,email').order('university');
  allDir = data||[];
  renderDir(allDir);
}
function filterDir(v) {
  const f = v.toLowerCase();
  renderDir(allDir.filter(u => (u.university||'').toLowerCase().includes(f)||(u.name||'').toLowerCase().includes(f)));
}
document.addEventListener('DOMContentLoaded', ()=>{
  const ds = document.getElementById('dirSearch');
  if (ds) ds.addEventListener('input', e => filterDir(e.target.value));
});
function renderDir(list) {
  const c = document.getElementById('dirList');
  if (!list.length) { c.innerHTML='<p style="color:#888">কোনো ফলাফল নেই</p>'; return; }
  let lastUni=''; let html='';
  list.forEach(u => {
    if (u.university !== lastUni) {
      lastUni = u.university;
      html += `<div style="color:#ff3369;font-size:13px;font-weight:800;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid rgba(255,51,105,.18)">🎓 ${u.university||'অজানা'}</div>`;
    }
    html += `<div style="display:flex;justify-content:space-between;padding:8px 11px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:4px;flex-wrap:wrap;gap:6px"><span style="font-size:13px;color:#e0e0f0">${u.name||'—'}</span><span style="font-size:13px;color:#ff99bb">${u.whatsapp||'—'}</span></div>`;
  });
  c.innerHTML = html;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
